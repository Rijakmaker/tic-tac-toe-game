<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tic Tac Toe</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<div class="setup">

<input type="text" id="player1Name" placeholder="Enter Player 1 Name">

<select id="player1Symbol">
<option>X</option>
<option>O</option>
<option>⭐</option>
<option>❤️</option>
<option>🔺</option>
<option>🔵</option>
</select>

<br><br>

<input type="text" id="player2Name" placeholder="Enter Player 2 Name">

<select id="player2Symbol">
<option>O</option>
<option>X</option>
<option>⭐</option>
<option>❤️</option>
<option>🔺</option>
<option>🔵</option>
</select>

<br><br>

<button id="startGame">Start Game</button>

</div>

<div id="status">Enter player names and start game</div>

<div class="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

<button id="restartBtn">Restart Game</button>

</div>

<script src="script.js"></script>

</body>
</html>
